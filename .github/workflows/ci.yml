name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-racer-telemetry
    steps:
      - uses: actions/checkout@v7
        with:
          path: embedded/sigma-racer-telemetry

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-racer-sidearm
          path: embedded/sigma-racer-sidearm

      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: embedded/sigma-racer-telemetry
          add-rust-environment-hash-key: false
          key: ${{ hashFiles('embedded/sigma-racer-telemetry/Cargo.lock', 'embedded/sigma-racer-telemetry/Cargo.toml', 'embedded/sigma-racer-telemetry/rust-toolchain.toml', 'embedded/sigma-racer-telemetry/.cargo/config.toml') }}

      - name: Tests
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
